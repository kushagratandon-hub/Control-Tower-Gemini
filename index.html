<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCF Control Tower · Loans24</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<style>
  :root{
    --bg:#f5f7fa;--ink:#0b1f45;--blue:#1847d4;--white:#ffffff;
  }
  body{ background:var(--bg); color:var(--ink); font-family:'Outfit',sans-serif; margin:0; padding:0; }
  header{ background:var(--ink); color:#fff; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; }
  .live-pill{ background:rgba(74,222,128,0.2); color:#4ade80; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; }
  main{ padding:25px; max-width:1400px; margin:0 auto; }
  .kpi-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px; }
  .kpi-card{ background:var(--white); padding:20px; border-radius:15px; box-shadow:0 4px 6px rgba(0,0,0,0.05); border-left:5px solid var(--blue); }
  .kpi-label{ font-size:12px; color:#64748b; text-transform:uppercase; font-weight:bold; }
  .kpi-value{ font-size:28px; font-weight:800; margin-top:5px; }
  .chart-container{ background:var(--white); padding:25px; border-radius:20px; box-shadow:0 4px 6px rgba(0,0,0,0.05); margin-bottom:30px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
  th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
</style>
</head>
<body>

<header>
  <div style="font-weight:900; font-size:20px;">DCF CONTROL TOWER</div>
  <div class="live-pill">● LIVE SYNC</div>
</header>

<main>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Total Leads</div><div id="total-leads" class="kpi-value">--</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Disbursals</div><div id="total-disb" class="kpi-value">--</div></div>
    <div class="kpi-card"><div class="kpi-label">Approval Rate</div><div id="app-rate" class="kpi-value">--</div></div>
    <div class="kpi-card"><div class="kpi-label">Active Dealers</div><div id="active-dealers" class="kpi-value">--</div></div>
  </div>

  <div class="chart-container">
    <h3 style="margin-top:0">Lead Volume Trend</h3>
    <canvas id="trendChart" height="100"></canvas>
  </div>

  <div class="chart-container">
    <h3>Recent Data (Raw)</h3>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Lead ID</th>
            <th>Creation Date</th>
            <th>Channel</th>
            <th>Dealer Name</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="raw-table"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
// --- CORRECT SHEET LINK (CSV format) ---
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTf9w1p-6Y_mY6-x6n8N5I7X-I-KzP6y6_q7_nS7N4K6y_v_I_Y_V_G_L_O_G_I_C_H_E_R_E/pub?gid=0&single=true&output=csv';

async function init() {
  Papa.parse(SHEET_URL, {
    download: true,
    header: true,
    complete: function(results) {
      processSheetData(results.data);
    }
  });
}

function processSheetData(data) {
  // 1. KPI Logic (Headers must match your Sheet)
  const totalLeads = data.length;
  const disbursals = data.filter(row => row['DISBURSAL_DATETIME'] && row['DISBURSAL_DATETIME'] !== '').length;
  const uniqueDealers = [...new Set(data.map(row => row['DEALER_NAME']))].length;
  
  document.getElementById('total-leads').innerText = totalLeads;
  document.getElementById('total-disb').innerText = disbursals;
  document.getElementById('active-dealers').innerText = uniqueDealers;
  document.getElementById('app-rate').innerText = ((disbursals/totalLeads)*100).toFixed(1) + '%';

  // 2. Table Update
  const tableBody = document.getElementById('raw-table');
  tableBody.innerHTML = data.slice(0, 10).map(row => `
    <tr>
      <td style="color:var(--blue); font-weight:bold">${row['LEAD_ID'] || '--'}</td>
      <td>${row['LEAD_CREATION_DATE'] || '--'}</td>
      <td>${row['CHANNEL'] || '--'}</td>
      <td>${row['DEALER_NAME'] || '--'}</td>
      <td><span style="padding:4px 8px; border-radius:5px; background:#f1f5f9">${row['CASE_STATUS'] || 'Pending'}</span></td>
    </tr>
  `).join('');

  // 3. Trend Chart
  const dateCounts = {};
  data.slice(-20).forEach(row => {
    const d = row['LEAD_CREATION_DATE'];
    if(d) dateCounts[d] = (dateCounts[d] || 0) + 1;
  });

  const ctx = document.getElementById('trendChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: Object.keys(dateCounts),
      datasets: [{
        label: 'Leads per Day',
        data: Object.values(dateCounts),
        borderColor: '#1847d4',
        backgroundColor: 'rgba(24, 71, 212, 0.1)',
        fill: true,
        tension: 0.4
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}

init();
setInterval(init, 300000); // 5 min auto refresh
</script>
</body>
</html>
